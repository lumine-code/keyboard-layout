name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: 20
          - os: ubuntu-latest
            node: 24
          - os: macos-latest
            node: 24
          - os: windows-latest
            node: 24
    steps:
      - name: Enable Git symlinks on Windows
        if: runner.os == 'Windows'
        run: git config --global core.symlinks true
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install Linux prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxkbfile-dev libwayland-dev libxkbcommon-dev libxkbcommon-x11-dev xkb-data xvfb
      - name: Install dependencies
        run: npm ci
      - name: Run tests on Linux
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test
      - name: Run tests on macOS and Windows
        if: runner.os != 'Linux'
        run: npm test
      - name: Validate package contents
        run: npm pack --dry-run
